<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1836"/>
      <stop offset="1" stop-color="#06091A"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="160" y1="300" x2="864" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="walletShine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="white" stop-opacity="0.18"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="walletGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="28" flood-color="#3B82F6" flood-opacity="0.45"/>
    </filter>
    <filter id="coinGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#F59E0B" flood-opacity="0.55"/>
    </filter>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="210" fill="url(#bgGrad)"/>

  <!-- Soft background glow -->
  <circle cx="512" cy="500" r="380" fill="#3B82F6" fill-opacity="0.06"/>
  <circle cx="512" cy="500" r="240" fill="#3B82F6" fill-opacity="0.05"/>

  <!-- ── WALLET ── -->

  <!-- Wallet top flap -->
  <rect x="162" y="252" width="700" height="148" rx="58" fill="#1D4ED8"/>
  <!-- Flap shine -->
  <rect x="162" y="252" width="700" height="80" rx="58" fill="white" fill-opacity="0.07"/>

  <!-- Wallet body -->
  <rect x="162" y="348" width="700" height="384" rx="58" fill="url(#walletGrad)" filter="url(#walletGlow)"/>
  <!-- Body shine strip -->
  <rect x="162" y="348" width="700" height="100" rx="0" fill="url(#walletShine)"/>

  <!-- Clasp dot on flap -->
  <circle cx="512" cy="258" r="22" fill="#1E40AF"/>
  <circle cx="512" cy="258" r="11" fill="#3B82F6"/>

  <!-- ── CARD inside wallet ── -->
  <rect x="202" y="394" width="310" height="200" rx="22" fill="#1E3A8A" fill-opacity="0.55"/>
  <!-- Card chip -->
  <rect x="230" y="420" width="64" height="48" rx="10" fill="#FDE68A" fill-opacity="0.9"/>
  <line x1="262" y1="420" x2="262" y2="468" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="230" y1="444" x2="294" y2="444" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Card dots (card number) -->
  <circle cx="232" cy="556" r="8" fill="white" fill-opacity="0.28"/>
  <circle cx="258" cy="556" r="8" fill="white" fill-opacity="0.28"/>
  <circle cx="284" cy="556" r="8" fill="white" fill-opacity="0.28"/>
  <circle cx="328" cy="556" r="8" fill="white" fill-opacity="0.28"/>
  <circle cx="354" cy="556" r="8" fill="white" fill-opacity="0.28"/>
  <circle cx="380" cy="556" r="8" fill="white" fill-opacity="0.28"/>
  <!-- Card expiry line -->
  <rect x="232" y="576" width="100" height="10" rx="5" fill="white" fill-opacity="0.18"/>

  <!-- ── COIN / POCKET ── -->
  <!-- Outer ring -->
  <circle cx="714" cy="546" r="112" fill="#0D1426" fill-opacity="0.35"/>
  <!-- Coin -->
  <circle cx="714" cy="546" r="92" fill="url(#coinGrad)" filter="url(#coinGlow)"/>
  <!-- Inner ring on coin -->
  <circle cx="714" cy="546" r="76" fill="none" stroke="#F59E0B" stroke-width="4" stroke-opacity="0.45"/>
  <!-- ₹ Rupee symbol -->
  <text x="714" y="582" text-anchor="middle" font-size="82" font-weight="900"
        fill="#78350F" font-family="'Arial', 'Helvetica Neue', sans-serif">₹</text>

  <!-- ── Decorative sparkles top-right ── -->
  <circle cx="812" cy="210" r="7" fill="#60A5FA" fill-opacity="0.35"/>
  <circle cx="840" cy="234" r="4.5" fill="#60A5FA" fill-opacity="0.22"/>
  <circle cx="790" cy="238" r="3.5" fill="#60A5FA" fill-opacity="0.18"/>

  <!-- ── Decorative bottom-left ── -->
  <circle cx="192" cy="800" r="6" fill="#10B981" fill-opacity="0.3"/>
  <circle cx="172" cy="778" r="4" fill="#10B981" fill-opacity="0.18"/>
</svg>
